services:
  app:
    build: .
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ~/.ssh/id_rsa:/root/.ssh/id_rsa:ro
      - ~/.gitconfig:/root/.gitconfig:ro
    ports:
      - "4321:4321"
    working_dir: /app
    stdin_open: true
    tty: true
    command: sh -c "pnpm i && pnpm dev --host"

volumes:
  node_modules:
