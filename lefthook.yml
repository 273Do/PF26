output:
  - execution
  - execution_out
  - execution_info
  - summary

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{ts,tsx,js,jsx,json,css,astro}"
      run: pnpm run format
      stage_fixed: true

    lint:
      glob: "*.{ts,tsx,js,jsx,astro}"
      run: pnpm run lint

    type-check:
      run: pnpm run check

pre-push:
  commands:
    format-check:
      run: pnpm run format:check

    lint-check:
      run: pnpm run lint:check

    type-check:
      run: pnpm run check

    # test:
    #   run: pnpm run test

commit-msg:
  commands:
    message-check:
      run: |
        if ! grep -qE "^(feat|fix|refactor|chore):" {1}; then
          echo "🔥 Commit message must start with: feat|fix|refactor|chore"
          exit 1
        fi
