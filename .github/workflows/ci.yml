name: CI

on:
  push:
  pull_request:

jobs:
  generate-schema:
    name: Generate Schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI schema
        env:
          STRAPI_URL: ${{ secrets.STRAPI_URL }}
        run: pnpm types:generate

      - name: Upload schema artifacts
        uses: actions/upload-artifact@v4
        with:
          name: schema
          path: types/schema.ts
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: generate-schema
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download schema
        uses: actions/download-artifact@v4
        with:
          name: schema
          path: types/

      - name: Run ESLint
        run: pnpm lint:check

      - name: Check formatting
        run: pnpm format:check

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: generate-schema
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download schema
        uses: actions/download-artifact@v4
        with:
          name: schema
          path: types/

      - name: Run type check
        run: pnpm check
